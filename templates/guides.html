{% extends "base.html" %}
{% block content %}
<section class="panel article">
  <h1>{{ text.guides_title }}</h1>
  <p>{{ text.guides_desc }}</p>
</section>
<section class="panel">
  <div class="cards">
    {% for guide in guides %}
    <article class="card">
      <div class="meta"><span>{{ 'Guide' if lang == 'en' else '가이드' }}</span></div>
      <h2><a href="{{ localize('/guides/' ~ guide.slug, lang) }}">{{ guide.title }}</a></h2>
      <p>{{ guide.description }}</p>
      <a href="{{ localize('/guides/' ~ guide.slug, lang) }}">{{ text.read }}</a>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
